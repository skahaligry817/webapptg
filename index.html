<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giveaway Panel</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Golos+Text:wght@400;500;600;700&display=swap');
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c28;--border:#2a2a3d;--accent:#7c6af7;--accent2:#f7a26a;--success:#4ade80;--danger:#f87171;--text:#e8e8f0;--muted:#6b6b88;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a1030,#0f1a30);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{color:var(--muted);font-size:12px;margin-top:2px}
.nav{display:flex;gap:6px;padding:14px 20px 0;border-bottom:1px solid var(--border);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Golos Text',sans-serif;font-size:13px;font-weight:600;padding:8px 16px 10px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.nb.active{color:var(--accent);border-bottom-color:var(--accent)}
.nb:hover:not(.active){color:var(--text)}
.page{display:none;padding:20px;animation:fi .25s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .2s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card.active::before{background:var(--success)}
.card.scheduled::before{background:var(--accent2)}
.card.finished::before{background:var(--muted)}
.card.cancelled::before{background:var(--danger)}
.card:hover{border-color:var(--accent)}
.ct{font-weight:700;font-size:15px;margin-bottom:6px;padding-left:10px}
.cm{display:flex;flex-wrap:wrap;gap:8px;padding-left:10px}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.badge.active{background:#4ade8022;color:var(--success)}
.badge.scheduled{background:#f7a26a22;color:var(--accent2)}
.badge.finished{background:#ffffff11;color:var(--muted)}
.badge.cancelled{background:#f8717122;color:var(--danger)}
.badge.info{background:#7c6af722;color:var(--accent)}
.ca{display:flex;gap:8px;margin-top:12px;padding-left:10px}
.bs{border:none;cursor:pointer;font-family:'Golos Text',sans-serif;font-size:12px;font-weight:600;border-radius:8px;padding:6px 12px;transition:all .15s}
.bs.danger{background:#f8717122;color:var(--danger)}
.bs.success{background:#4ade8022;color:var(--success)}
.bs.primary{background:#7c6af722;color:var(--accent)}
.bs:hover{filter:brightness(1.3)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.sn{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sl{color:var(--muted);font-size:12px;margin-top:4px}
.fs{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:16px}
.fst{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--accent);margin-bottom:14px}
.fr{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:14px;transition:border-color .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px #7c6af720}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface2)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pr{display:flex;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.pn{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent2);min-width:24px}
.pr input{background:none;border:none;padding:4px 6px;font-size:13px;flex:1}
.pr input:focus{box-shadow:none;border:none}
.rp{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;padding:0 4px;transition:color .15s}
.rp:hover{color:var(--danger)}
.apb{width:100%;background:none;border:1px dashed var(--border);border-radius:10px;padding:10px;cursor:pointer;color:var(--muted);font-family:'Golos Text',sans-serif;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.apb:hover{border-color:var(--accent);color:var(--accent)}
.tg{display:flex;gap:8px;flex-wrap:wrap}
.tb{border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);border-radius:10px;padding:8px 14px;font-family:'Golos Text',sans-serif;font-size:13px;font-weight:600;transition:all .15s}
.tb.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.bm{width:100%;padding:16px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),#5b4fd4);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;border-radius:var(--r);transition:all .2s;margin-top:8px}
.bm:hover{filter:brightness(1.15);transform:translateY(-1px)}
.bm:active{transform:translateY(0)}
.bm:disabled{opacity:.5;cursor:not-allowed;transform:none}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--success);color:var(--success)}
.toast.error{border-color:var(--danger);color:var(--danger)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.pb{height:4px;background:var(--border);border-radius:4px;margin-top:8px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .3s}
.no-ch{background:#f7a26a11;border:1px solid #f7a26a44;border-radius:10px;padding:14px;margin-bottom:16px;color:var(--accent2);font-size:13px;line-height:1.6}
.no-ch code{background:#ffffff11;padding:2px 6px;border-radius:4px;font-family:monospace}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🎉 GIVEAWAY</div>
  <div class="header-sub">Панель управления розыгрышами</div>
</div>
<nav class="nav">
  <button class="nb active" onclick="showPage('list',this)">📋 Розыгрыши</button>
  <button class="nb" onclick="showPage('create',this)">➕ Создать</button>
  <button class="nb" onclick="showPage('stats',this)">📊 Статистика</button>
</nav>

<!-- СПИСОК -->
<div id="page-list" class="page active">
  <div id="giveaways-container">
    <div class="empty"><div class="empty-icon">🎯</div><div>Загрузка...</div></div>
  </div>
</div>

<!-- СОЗДАТЬ -->
<div id="page-create" class="page">
  <div id="no-channels-warning" class="no-ch" style="display:none">
    ⚠️ Нет каналов. Сначала добавь канал в бот командой:<br>
    <code>/add_channel @твой_канал</code><br>
    Бот должен быть администратором канала.
  </div>

  <div class="fs">
    <div class="fst">📢 Канал</div>
    <div class="fr">
      <label>Канал для публикации</label>
      <select id="f-channel"></select>
    </div>
  </div>

  <div class="fs">
    <div class="fst">📝 Основное</div>
    <div class="fr"><label>Название розыгрыша</label><input id="f-title" type="text" placeholder="Большой розыгрыш декабря"></div>
    <div class="fr"><label>Описание (условия, что разыгрывается)</label><textarea id="f-description" placeholder="Разыгрываем промокоды на скидку..."></textarea></div>
    <div class="r2">
      <div class="fr"><label>Победителей</label><input id="f-winners" type="number" value="1" min="1" max="20"></div>
      <div class="fr"><label>Длительность (часов)</label><input id="f-duration" type="number" value="24" min="1" max="720"></div>
    </div>
  </div>

  <div class="fs">
    <div class="fst">🎁 Призы</div>
    <div id="prizes-container"></div>
    <button class="apb" onclick="addPrize()"><span>＋</span> Добавить приз</button>
  </div>

  <div class="fs">
    <div class="fst">🚀 Запуск</div>
    <div class="fr">
      <label>Когда запустить?</label>
      <div class="tg">
        <button class="tb sel" onclick="setStart('now',this)">⚡ Сразу</button>
        <button class="tb" onclick="setStart('later',this)">📅 Отложить</button>
      </div>
    </div>
    <div id="sched-row" class="fr" style="display:none">
      <label>Дата и время запуска</label>
      <input id="f-starts" type="datetime-local">
    </div>
  </div>

  <div class="fs">
    <div class="fst">🔁 Повтор</div>
    <div class="fr">
      <div class="tg">
        <button class="tb sel" onclick="setRepeat('none',this)">❌ Без повтора</button>
        <button class="tb" onclick="setRepeat('daily',this)">📅 Каждый день</button>
        <button class="tb" onclick="setRepeat('weekly',this)">📆 Каждую неделю</button>
      </div>
    </div>
  </div>

  <button class="bm" onclick="submit()">СОЗДАТЬ РОЗЫГРЫШ</button>
</div>

<!-- СТАТИСТИКА -->
<div id="page-stats" class="page">
  <div id="stats-container"><div class="empty"><div class="empty-icon">📊</div><div>Загрузка...</div></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let startType = 'now', repeatType = 'none', prizeCount = 0;

// ── Получаем каналы из URL параметра (бот передаёт их) ──
function getChannelsFromUrl() {
  // Твои каналы — просто добавляй сюда
  return [
    "@youtisllllllllllllllllllllllllll",
    "@твой_канал_2",
  ];
}
  // Способ 1: из URL параметра ?channels=@ch1,@ch2
  const urlParams = new URLSearchParams(window.location.search);
  const fromUrl = urlParams.get('channels');
  if (fromUrl) return fromUrl.split(',').filter(Boolean);

  // Способ 2: из Telegram initData startParam
  if (tg?.initDataUnsafe?.start_param) {
    const sp = tg.initDataUnsafe.start_param;
    if (sp.includes('@') || sp.includes('-100')) {
      return sp.split(',').filter(Boolean);
    }
  }

  // Способ 3: из hash параметра (Telegram WebApp передаёт через #)
  if (window.location.hash) {
    try {
      const hash = window.location.hash.slice(1);
      const p = new URLSearchParams(hash);
      const ch = p.get('channels');
      if (ch) return ch.split(',').filter(Boolean);
    } catch(e) {}
  }

  return [];
}

window.onload = () => {
  fillChannels();
  addPrize();
  loadGiveaways();
};

function fillChannels() {
  const sel = document.getElementById('f-channel');
  const channels = getChannelsFromUrl();
  const warn = document.getElementById('no-channels-warning');

  if (!channels.length) {
    warn.style.display = 'block';
    const opt = document.createElement('option');
    opt.value = ''; opt.text = '❌ Нет каналов — добавь через /add_channel';
    sel.appendChild(opt);
    return;
  }

  warn.style.display = 'none';
  channels.forEach(ch => {
    const opt = document.createElement('option');
    opt.value = ch; opt.text = ch;
    sel.appendChild(opt);
  });
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'list') loadGiveaways();
  if (name === 'stats') loadStats();
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 2500);
}

function loadGiveaways() {
  const c = document.getElementById('giveaways-container');
  const stored = JSON.parse(localStorage.getItem('giveaways') || '[]');
  if (!stored.length) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">🎯</div><div>Нет розыгрышей. Создай первый!</div></div>`;
    return;
  }
  const st = {active:'🟢 Активен',scheduled:'🟡 Запланирован',finished:'⚪ Завершён',cancelled:'🔴 Отменён'};
  c.innerHTML = stored.map((gw,i) => `
    <div class="card ${gw.status}">
      <div class="ct">${gw.title}</div>
      <div class="cm">
        <span class="badge ${gw.status}">${st[gw.status]||gw.status}</span>
        <span class="badge info">📢 ${gw.channel}</span>
        <span class="badge info">🏆 ${gw.winners_count} поб.</span>
        <span class="badge info">⏱ ${gw.duration_hours}ч</span>
        ${gw.repeat&&gw.repeat!=='none'?`<span class="badge info">🔁 ${gw.repeat==='daily'?'ежедневно':'еженедельно'}</span>`:''}
        ${gw.starts_at?`<span class="badge info">📅 ${fdt(gw.starts_at)}</span>`:''}
      </div>
      <div class="pb"><div class="pf" style="width:${gw.status==='active'?'60':gw.status==='finished'?'100':'20'}%"></div></div>
      <div class="ca">
        ${gw.status==='active'?`<button class="bs success" onclick="finishGw(${i})">✅ Завершить</button>`:''}
        ${gw.status!=='finished'&&gw.status!=='cancelled'?`<button class="bs danger" onclick="cancelGw(${i})">❌ Отменить</button>`:''}
        <button class="bs primary" onclick="showPrizes(${i})">🎁 Призы</button>
      </div>
    </div>`).join('');
}

function fdt(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('ru',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function finishGw(i) {
  if (!confirm('Завершить досрочно?')) return;
  const gws = JSON.parse(localStorage.getItem('giveaways')||'[]');
  gws[i].status='finished'; localStorage.setItem('giveaways',JSON.stringify(gws));
  sendBot({action:'finish_giveaway',giveaway_id:gws[i].id});
  loadGiveaways(); showToast('✅ Завершён!');
}

function cancelGw(i) {
  if (!confirm('Отменить?')) return;
  const gws = JSON.parse(localStorage.getItem('giveaways')||'[]');
  gws[i].status='cancelled'; localStorage.setItem('giveaways',JSON.stringify(gws));
  sendBot({action:'cancel_giveaway',giveaway_id:gws[i].id});
  loadGiveaways(); showToast('❌ Отменён','error');
}

function showPrizes(i) {
  const gws = JSON.parse(localStorage.getItem('giveaways')||'[]');
  const p = gws[i].prizes||[];
  alert('🎁 Призы:\n\n' + (p.length ? p.map(x=>`${x.place}. ${x.label} | ${x.code}`).join('\n') : 'Нет'));
}

function loadStats() {
  const c = document.getElementById('stats-container');
  const stored = JSON.parse(localStorage.getItem('giveaways')||'[]');
  const total=stored.length, active=stored.filter(g=>g.status==='active').length,
        finished=stored.filter(g=>g.status==='finished').length,
        sched=stored.filter(g=>g.status==='scheduled').length;
  c.innerHTML = `
    <div class="sg">
      <div class="sc"><div class="sn">${total}</div><div class="sl">Всего</div></div>
      <div class="sc"><div class="sn" style="color:var(--success)">${active}</div><div class="sl">Активных</div></div>
      <div class="sc"><div class="sn" style="color:var(--accent2)">${sched}</div><div class="sl">Запланировано</div></div>
      <div class="sc"><div class="sn" style="color:var(--muted)">${finished}</div><div class="sl">Завершено</div></div>
    </div>
    ${active>0?`<div class="fs"><div class="fst">🟢 Активные</div>${stored.filter(g=>g.status==='active').map(g=>`
      <div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="font-weight:700">${g.title}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px">📢 ${g.channel} · 🏆 ${g.winners_count} · ⏱ ${g.duration_hours}ч</div>
      </div>`).join('')}</div>`:''}`;
}

// ── Форма ──
function setStart(t, btn) {
  startType = t;
  document.querySelectorAll('#page-create .fs:nth-child(5) .tb').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('sched-row').style.display = t==='later'?'block':'none';
}

function setRepeat(t, btn) {
  repeatType = t;
  document.querySelectorAll('#page-create .fs:nth-child(6) .tb').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

function addPrize() {
  prizeCount++;
  const c = document.getElementById('prizes-container');
  const d = document.createElement('div');
  d.className='pr'; d.id=`prize-${prizeCount}`;
  d.innerHTML=`<span class="pn">${prizeCount}</span>
    <input type="text" placeholder="Название приза" class="pl">
    <span style="color:var(--muted);font-size:16px">|</span>
    <input type="text" placeholder="ПРОМОКОД" class="pc" style="font-family:monospace;max-width:140px">
    <button class="rp" onclick="removePrize('prize-${prizeCount}')">×</button>`;
  c.appendChild(d);
  updateNums();
}

function removePrize(id) {
  const el=document.getElementById(id);
  if(el&&document.querySelectorAll('.pr').length>1){el.remove();updateNums();}
}

function updateNums() {
  document.querySelectorAll('.pr').forEach((r,i)=>r.querySelector('.pn').textContent=i+1);
}

function submit() {
  const channel = document.getElementById('f-channel').value;
  const title   = document.getElementById('f-title').value.trim();
  const desc    = document.getElementById('f-description').value.trim();
  const winners = parseInt(document.getElementById('f-winners').value);
  const dur     = parseFloat(document.getElementById('f-duration').value);

  if (!channel || channel === '') { showToast('❌ Нет каналов','error'); return; }
  if (!title)   { showToast('❌ Введи название','error'); return; }
  if (!desc)    { showToast('❌ Введи описание','error'); return; }

  const prizes=[];
  document.querySelectorAll('.pr').forEach((r,i)=>{
    const l=r.querySelector('.pl').value.trim(), c=r.querySelector('.pc').value.trim();
    if(l&&c) prizes.push({place:i+1,label:l,code:c});
  });
  if (!prizes.length) { showToast('❌ Добавь хотя бы один приз','error'); return; }

  let starts_at=null;
  if (startType==='later') {
    const v=document.getElementById('f-starts').value;
    if (!v) { showToast('❌ Укажи дату запуска','error'); return; }
    starts_at=new Date(v).toISOString();
  }

  const gw={id:Date.now(),channel,title,description:desc,winners_count:winners,duration_hours:dur,
             starts_at,repeat:repeatType,status:startType==='later'?'scheduled':'active',
             prizes,created_at:new Date().toISOString()};

  const stored=JSON.parse(localStorage.getItem('giveaways')||'[]');
  stored.unshift(gw); localStorage.setItem('giveaways',JSON.stringify(stored));

  sendBot({
    action:'create_giveaway',
    giveaway:{channel,title,description:desc,winners_count:winners,duration_hours:dur,
              starts_at,repeat_interval:repeatType==='none'?null:repeatType},
    prizes
  });

  showToast(startType==='later'?'📅 Запланирован!':'✅ Создан!');

  // Сброс
  document.getElementById('f-title').value='';
  document.getElementById('f-description').value='';
  document.getElementById('f-winners').value=1;
  document.getElementById('f-duration').value=24;
  document.getElementById('prizes-container').innerHTML='';
  prizeCount=0; addPrize(); startType='now'; repeatType='none';

  setTimeout(()=>{ document.querySelector('.nb').click(); },800);
}

function sendBot(data) {
  if (tg) tg.sendData(JSON.stringify(data));
  else console.log('WebApp data:', data);
}
</script>
</body>
</html>
